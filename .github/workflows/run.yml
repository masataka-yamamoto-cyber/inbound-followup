name: Inbound Followup

on:
  repository_dispatch:
    types: [salesforce-task-created]
  workflow_dispatch: # 手動実行も可能

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install slack_sdk google-auth google-api-python-client

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli

      - name: Authenticate Salesforce
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > /tmp/authurl.txt
          sf org login sfdx-url --sfdx-url-file /tmp/authurl.txt --alias prod --set-default
          rm /tmp/authurl.txt

      - name: Set up Gmail credentials
        run: |
          mkdir -p .gmail_credentials
          echo '${{ secrets.GMAIL_SERVICE_ACCOUNT_JSON }}' > .gmail_credentials/service_account.json

      - name: Run script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TASK_LEAD_ID: ${{ github.event.client_payload.lead_id }}
        run: |
          if [ -n "$TASK_LEAD_ID" ]; then
            python inbound_followup.py --execute --lead-id "$TASK_LEAD_ID"
          else
            python inbound_followup.py --execute
          fi
